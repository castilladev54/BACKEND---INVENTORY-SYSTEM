name: CI/CD — Test & Docker Build

on:
  push:
    branches: [main, feat/**, feature/**]
  pull_request:
    branches: [main]

jobs:
  # 🧪 JOB: Tests
  test:
    name: 🧪 Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Vitest
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_key_ci

  # 🐳 JOB: Docker (Always build for validation)
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check for Docker Secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_TOKEN }}" ]; then
            echo "can_push=true" >> $GITHUB_OUTPUT
          else
            echo "can_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        # Solo lo hacemos si estamos en main, en un push, y tenemos secretos
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.check_secrets.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Solo pushear si estamos en main, en un push, y tenemos secretos
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.check_secrets.outputs.can_push == 'true' }}
          tags: ${{ secrets.DOCKER_USERNAME || 'local' }}/backend-inventory:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
