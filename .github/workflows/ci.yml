name: CI/CD — Test & Docker Build

on:
  push:
    branches: [main, feat/**, feature/**]
  pull_request:
    branches: [main]

jobs:
  # 🧪 JOB: Tests
  test:
    name: 🧪 Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Vitest
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: dummy_secret

  # 🐳 JOB: Docker (ONLY on main branch and if secrets are present)
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    # Solo intentamos subir si estamos en main y tenemos las credenciales
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for Docker Secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_TOKEN }}" ]; then
            echo "::warning title=Missing Secrets::Docker credentials are missing. Skipping push."
            echo "available=false" >> $GITHUB_OUTPUT
          else
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check_secrets.outputs.available == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check_secrets.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        if: steps.check_secrets.outputs.available == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/backend-inventory:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
