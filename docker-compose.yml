services:
  # ─── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: inventory-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: inventarioCrud
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Backend API ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongo:27017/inventarioCrud?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      MAILTRAP_TOKEN: ${MAILTRAP_TOKEN}
      MAILTRAP_ENDPOINT: ${MAILTRAP_ENDPOINT:-https://send.api.mailtrap.io}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      ADMIN_REGISTRATION_KEY: ${ADMIN_REGISTRATION_KEY}
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
